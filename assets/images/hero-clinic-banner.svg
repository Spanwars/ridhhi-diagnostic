<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Clinic hero banner placeholder</title>
  <desc id="desc">Placeholder hero banner for Ridhhi clinic. Replace with provided photo banner.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fdf3f3"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1420" cy="-120" r="450" fill="#d71f28" opacity="0.2"/>
  <circle cx="150" cy="940" r="380" fill="#d71f28" opacity="0.13"/>
  <rect x="90" y="110" width="680" height="240" rx="20" fill="#ffffff" opacity="0.9"/>
  <text x="130" y="220" font-size="92" font-family="Arial" fill="#cb1e25" font-weight="700">Ridhhi</text>
  <text x="130" y="320" font-size="78" font-family="Arial" fill="#2f364f" font-weight="700">Diagnostic Center</text>
  <text x="130" y="390" font-size="30" font-family="Arial" fill="#8f2330">Hero image placeholder</text>
  <text x="130" y="430" font-size="30" font-family="Arial" fill="#8f2330">Replace with your provided banner photo</text>
</svg>
